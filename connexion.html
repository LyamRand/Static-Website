<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitApp - Connexion &amp; Inscription</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec6d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102218",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <div class="max-w-[1100px] w-full bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[700px]">
    <!-- Sidebar / Branding Illustration Side -->
    <div class="hidden md:flex md:w-1/2 bg-slate-50 dark:bg-slate-800 relative flex-col justify-between p-12 overflow-hidden">
    <div class="z-10">
    <div class="flex items-center gap-3 text-slate-900 dark:text-slate-100 mb-8">
    <div class="bg-primary p-2 rounded-lg">
        <svg class="w-8 h-8 text-slate-900" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill="currentColor" fill-rule="evenodd"></path>
        </svg>
    </div>
        <h1 class="text-2xl font-bold tracking-tight">SplitApp</h1>
    </div>
        <h2 class="text-4xl font-extrabold text-slate-900 dark:text-white leading-tight mb-4">Partagez vos dépenses en toute simplicité.</h2>
        <p class="text-slate-600 dark:text-slate-400 text-lg">Finis les calculs interminables après un dîner ou un voyage entre amis. SplitApp s'occupe de tout.</p>
    </div>
    <div class="z-10 mt-auto">
            <div class="flex gap-4">
            <div class="flex -space-x-4 overflow-hidden">
                </div>
        </div>
    </div>
    <!-- Background Decoration -->
    <div class="absolute bottom-0 right-0 opacity-10 pointer-events-none translate-x-1/4 translate-y-1/4">
    <svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="200" fill="#13ec6d" r="200"></circle>
    </svg>
    </div>
    </div>
    <!-- Form Side -->
    <div class="w-full md:w-1/2 p-8 md:p-12 lg:p-16 flex flex-col justify-center bg-white dark:bg-slate-900">
    <!-- Mobile Branding -->
    <div class="md:hidden flex items-center justify-center gap-2 mb-8">
    <div class="bg-primary p-1.5 rounded-lg">
    <svg class="w-6 h-6 text-slate-900" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
    <path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill="currentColor" fill-rule="evenodd"></path>
    </svg>
    </div>
    <h1 class="text-xl font-bold text-slate-900 dark:text-white">SplitApp</h1>
    </div>
    <!-- Toggle Switch -->
    <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl mb-8 w-full">
    <button class="flex-1 py-2.5 text-sm font-semibold rounded-lg bg-white dark:bg-slate-700 shadow-sm text-slate-900 dark:text-white transition-all">Connexion</button>
    <button class="flex-1 py-2.5 text-sm font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all">Inscription</button>
    </div>
    <div class="mb-6">
    <h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Bienvenue !</h3>
    <p class="text-slate-500 dark:text-slate-400">Veuillez entrer vos informations pour continuer.</p>
    </div>
    <!-- Form Content (Login State Shown) -->
    <form class="space-y-5">
    <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email ou Nom d'utilisateur</label>
    <div class="relative">
    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
    <input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-slate-900 dark:text-white" placeholder="exemple@mail.com" type="text"/>
    </div>
    </div>
    <div>
    <div class="flex justify-between mb-2">
    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Mot de passe</label>
    <a class="text-sm font-medium text-primary hover:underline" href="#">Mot de passe oublié ?</a>
    </div>
    <div class="relative">
    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
    <input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-slate-900 dark:text-white" placeholder="••••••••" type="password"/>
    </div>
    </div>
    <div class="flex items-center gap-2">
    <input class="w-4 h-4 rounded text-primary border-slate-300 focus:ring-primary cursor-pointer" id="remember" type="checkbox"/>
    <label class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Se souvenir de moi</label>
    </div>
    <button class="w-full bg-primary hover:bg-opacity-90 text-slate-900 font-bold py-3.5 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
    <span>Se connecter</span>
    <span class="material-symbols-outlined text-[18px]">login</span>
    </button>
    </form>

    <!-- Hidden Registration Layout Template (Logic would normally toggle this) -->
    <!-- This is just here for completeness based on requirements -->
    <div class="hidden">
    <form class="space-y-5">
    <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Nom Complet</label>
    <input class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg" placeholder="Jean Dupont" type="text"/>
    </div>
    <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email</label>
    <input class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg" placeholder="jean@exemple.com" type="email"/>
    </div>
    <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Mot de passe</label>
    <input class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg" placeholder="••••••••" type="password"/>
    </div>
    <div>
    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Confirmer le mot de passe</label>
    <input class="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg" placeholder="••••••••" type="password"/>
    </div>
    <button class="w-full bg-primary font-bold py-3.5 rounded-lg" type="submit">S'inscrire</button>
    </form>
    </div>
</body>
</html>
