<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splitz</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <!-- Vue 3 & Vue Router via CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4.4.5/dist/vue-router.global.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700;800;900&family=Jost:wght@300;400;500&family=Pacifico&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#6155F5",
            "mauve": "#6155F5",
            "surface": "#F3F4F6",
            "surface-dark": "#E5E7EB",
            "green-success": "#22C55E",
            "red-danger": "#EF4444",
          },
          fontFamily: {
            "sans": ["Fira Sans", "sans-serif"],
            "logo": ["Pacifico", "cursive"]
          }
        }
      }
    }
  </script>
</head>

<body class="bg-[#F9FAFB] font-sans text-slate-900 m-0 p-0 overflow-x-hidden">

  <div id="app">
    <!-- Vue-Router monté ici : la navigation dynamisera cette balise -->
    <router-view></router-view>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
