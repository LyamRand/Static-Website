<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Splitz - Modifier la dépense</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#6155F5",
                        "surface": "#F3F4F6", 
                        "surface-dark": "#E5E7EB", 
                        "green-success": "#22C55E",
                        "red-danger": "#EF4444",
                    },
                    fontFamily: {
                        "sans": ["Fira Sans", "sans-serif"],
                        "logo": ["Pacifico", "cursive"]
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-slate-500 min-h-screen flex items-center justify-center p-4 text-slate-900">

    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
        
        <div class="bg-white w-full max-w-[600px] rounded-[32px] shadow-2xl overflow-hidden flex flex-col p-8 md:p-10 relative">
            
            <h2 class="text-3xl font-extrabold text-slate-900 mb-6">Modifier la dépense</h2>
            <hr class="border-slate-100 mb-8" />

            <form class="space-y-8">
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Montant (€)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-900 font-bold text-lg">€</span>
                        <input type="text" value="45,00" placeholder="0,00" 
                            class="w-full pl-10 pr-4 py-4 bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 font-semibold placeholder-slate-400" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Description</label>
                    <textarea placeholder="Qu'avez-vous payé ?" rows="1" 
                        class="w-full px-5 py-4 bg-surface border-none rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 font-semibold placeholder-slate-400">Restaurant</textarea>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 pt-4 mt-auto">
                    <button type="submit"
                        class="flex-[2] py-4 rounded-xl bg-primary hover:bg-[#5044e6] text-white font-bold text-base transition-all shadow-lg shadow-primary/30 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">check_circle</span>
                        Enregistrer
                    </button>
                    <a href="index.html"
                        class="flex-[1] flex items-center justify-center py-4 rounded-xl bg-surface hover:bg-slate-200 text-slate-600 font-bold text-base transition-all">
                        Annuler
                    </a>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
